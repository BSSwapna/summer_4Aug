<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B.Tech Student CV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
       
        .skill {
            background-color: #3498db;
            color: white;
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 0.9em;
        }
        
        ul {
            padding-left: 20px;
        }
        
        ul li {
            margin-bottom: 5px;
        @media (max-width: 600px) {
            .container {
                margin: 10px;
                padding: 15px;
            }
            
            header h1 {
                font-size: 1.8em;
            }
            
            .item-header {
                flex-direction: column;
            }
            
            .item-header .date {
                margin-top: 3px;
            }
        }

        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            background: #fff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
